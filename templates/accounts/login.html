{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card stat-card p-4">
      <div class="text-center mb-4">
        <div style="font-size:50px" role="img" aria-label="Graduation Cap">🎓</div>
        <h3 class="fw-bold" style="color:#1a237e">Welcome Back!</h3>
        <p class="text-muted">Login to view your results</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger" role="alert" aria-live="assertive">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" aria-label="Student Login Form">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="username">Username</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true">
              <i class="bi bi-person-fill"></i>
            </span>
            <input
              type="text"
              name="username"
              id="username"
              class="form-control"
              placeholder="Enter username"
              aria-label="Username"
              aria-required="true"
              autocomplete="username"
              required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              name="password"
              id="password"
              class="form-control"
              placeholder="Enter password"
              aria-label="Password"
              aria-required="true"
              autocomplete="current-password"
              required/>
          </div>
        </div>
        <button
          type="submit"
          class="btn btn-primary-custom w-100 py-2 mt-2"
          aria-label="Login to EduTrack">
          <i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Login
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="/password-reset/"
          style="color:#1a237e;font-weight:600"
          aria-label="Forgot Password">
          Forgot Password?
        </a>
      </div>
      <div class="text-center mt-2">
        <p class="text-muted">Don't have an account?
          <a href="/register/"
            style="color:#1a237e;font-weight:600"
            aria-label="Register new account">
            Register here
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
