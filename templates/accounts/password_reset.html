{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card stat-card p-4">
      <div class="text-center mb-4">
        <div style="font-size:50px">🔐</div>
        <h3 class="fw-bold" style="color:#1a237e">Reset Password</h3>
        <p class="text-muted">Enter your email to reset password</p>
      </div>
      <form method="POST" aria-label="Password Reset Form">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email Address</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true">
              <i class="bi bi-envelope-fill"></i>
            </span>
            <input
              type="email"
              name="email"
              id="email"
              class="form-control"
              placeholder="your@email.com"
              aria-label="Email Address"
              aria-required="true"
              required/>
          </div>
        </div>
        <button type="submit"
          class="btn btn-primary-custom w-100 py-2"
          aria-label="Send Password Reset Email">
          <i class="bi bi-send me-2" aria-hidden="true"></i>Send Reset Link
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="/login/" style="color:#1a237e;font-weight:600">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
