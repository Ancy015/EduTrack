{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card stat-card p-4">
      <div class="text-center mb-4">
        <div style="font-size:50px">🔑</div>
        <h3 class="fw-bold" style="color:#1a237e">Set New Password</h3>
        <p class="text-muted">Enter your new password below</p>
      </div>
      <form method="POST" aria-label="Set New Password Form">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="new_password1">New Password</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              name="new_password1"
              id="new_password1"
              class="form-control"
              placeholder="New password"
              aria-label="New Password"
              aria-required="true"
              required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="new_password2">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text" aria-hidden="true">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              name="new_password2"
              id="new_password2"
              class="form-control"
              placeholder="Confirm new password"
              aria-label="Confirm New Password"
              aria-required="true"
              required/>
          </div>
        </div>
        <button type="submit"
          class="btn btn-primary-custom w-100 py-2"
          aria-label="Save New Password">
          <i class="bi bi-check-circle me-2" aria-hidden="true"></i>Save New Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
