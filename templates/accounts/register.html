{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card stat-card p-4">
      <div class="text-center mb-4">
        <div style="font-size:50px" role="img" aria-label="Registration">📝</div>
        <h3 class="fw-bold" style="color:#1a237e">Create Account</h3>
        <p class="text-muted">Register to access your results</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger" role="alert" aria-live="assertive">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" aria-label="Student Registration Form">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="first_name">First Name</label>
            <input
              type="text"
              name="first_name"
              id="first_name"
              class="form-control"
              placeholder="First name"
              aria-label="First Name"
              aria-required="true"
              required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="last_name">Last Name</label>
            <input
              type="text"
              name="last_name"
              id="last_name"
              class="form-control"
              placeholder="Last name"
              aria-label="Last Name"
              aria-required="true"
              required/>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="username">Username</label>
            <div class="input-group">
              <span class="input-group-text" aria-hidden="true">
                <i class="bi bi-person-fill"></i>
              </span>
              <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                placeholder="Choose username"
                aria-label="Username"
                aria-required="true"
                required/>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="email">Email</label>
            <div class="input-group">
              <span class="input-group-text" aria-hidden="true">
                <i class="bi bi-envelope-fill"></i>
              </span>
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                placeholder="your@email.com"
                aria-label="Email Address"
                aria-required="true"
                required/>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="roll_no">Roll Number</label>
            <div class="input-group">
              <span class="input-group-text" aria-hidden="true">
                <i class="bi bi-card-text"></i>
              </span>
              <input
                type="text"
                name="roll_no"
                id="roll_no"
                class="form-control"
                placeholder="e.g. 21CS001"
                aria-label="Roll Number"
                aria-required="true"
                required/>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="year">Year</label>
            <select
              name="year"
              id="year"
              class="form-select"
              aria-label="Select Year">
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3" selected>3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold" for="semester">Semester</label>
            <select
              name="semester"
              id="semester"
              class="form-select"
              aria-label="Select Semester">
              {% for i in "12345678" %}
                <option value="{{ i }}">Semester {{ i }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="password1">Password</label>
            <div class="input-group">
              <span class="input-group-text" aria-hidden="true">
                <i class="bi bi-lock-fill"></i>
              </span>
              <input
                type="password"
                name="password1"
                id="password1"
                class="form-control"
                placeholder="Create password"
                aria-label="Password"
                aria-required="true"
                required/>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" for="password2">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text" aria-hidden="true">
                <i class="bi bi-lock-fill"></i>
              </span>
              <input
                type="password"
                name="password2"
                id="password2"
                class="form-control"
                placeholder="Confirm password"
                aria-label="Confirm Password"
                aria-required="true"
                required/>
            </div>
          </div>
          <div class="col-12">
            <button
              type="submit"
              class="btn btn-primary-custom w-100 py-2"
              aria-label="Create Student Account">
              <i class="bi bi-person-check me-2" aria-hidden="true"></i>Create Account
            </button>
          </div>
        </div>
      </form>

      <div class="text-center mt-3">
        <p class="text-muted">Already have an account?
          <a href="/login/"
            style="color:#1a237e;font-weight:600"
            aria-label="Login to existing account">
            Login here
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
